# Top-level (Global) context
# 'auto' detects the number of CPU cores and spawns one process per core.
# PRECAUTION: If your Docker/K8s CPU limit is low (e.g., 0.5 or 1), 
# change 'auto' to '1' to avoid CPU thrashing and context switching.
worker_processes auto;

events { 
    # The max number of simultaneous connections per worker process.
    # Total capacity = worker_processes * worker_connections.
    worker_connections 1024; 
}

http {
    # Maps file extensions to content types (e.g., .html -> text/html, .js -> application/javascript).
    # Without this, browsers may fail to render CSS or execute JS correctly.
    include mime.types;

    # 'app' is the name of the service in docker-compose.yml
    # Docker's internal DNS automatically routes this to all 3 replicas!
    upstream node_cluster {
        least_conn; # Load balancing method: least connections
        server app:3000;
    }

    # --- HTTP Redirection ---
    # This catches anyone trying to use port 80 and forces them to HTTPS
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }


     # --- HTTPS Server configs ---
    server {
        listen 443 ssl;

        # Identifies which domain this config handles. 
        # Inside Docker, 'localhost' is standard for testing
        server_name localhost;
        
        # SSL Certificate Locations (as mounted in docker-compose)
        ssl_certificate     /etc/nginx/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/nginx-selfsigned.key;

        # Optimized SSL settings
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # define routing logic
        location / {
            # Pass the request to the 'node_cluster' defined above
            proxy_pass http://node_cluster;

            # --- Essential Proxy Headers ---
            # Passes the original 'Host' header from the client to the Node app
            proxy_set_header Host $host;

            # Passes the real IP of the visitor so your Node app isn't "blind"
            proxy_set_header X-Real-IP $remote_addr;
            
            # A list containing every IP the request has passed through
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Tells the Node app if the visitor used HTTP or HTTPS
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts (Optional)
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
            proxy_read_timeout 90;
        }
    }
}

